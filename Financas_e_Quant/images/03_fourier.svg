<svg width="700" height="300" viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#121212" rx="10"/>

  <g transform="translate(40, 20)">
    <!-- Grid -->
    <path d="M0,50 L620,50 M0,100 L620,100 M0,150 L620,150 M0,200 L620,200 M0,250 L620,250" stroke="#333" stroke-width="1"/>
    
    <!-- Original Noisy Signal (Light Blue, Opacity 0.5) -->
    <path d="M0,150 L20,120 L40,160 L60,80 L80,110 L100,50 L120,90 L140,140 L160,110 L180,180 L200,160 L220,220 L240,190 L260,250 L280,210 L300,190 L320,130 L340,160 L360,100 L380,120 L400,60 L420,90 L440,140 L460,120 L480,170 L500,150 L520,210 L540,180 L560,240 L580,200 L600,170 L620,120" fill="none" stroke="#3498db" stroke-width="2" opacity="0.6"/>
    
    <!-- Filtered Smooth Signal (DSP Fourier Wave - Red) -->
    <path d="M0,150 Q40,40 100,70 T240,220 T400,80 T600,200" fill="none" stroke="#e74c3c" stroke-width="4" stroke-dasharray="10,0"/>

    <text x="630" y="70" fill="#e74c3c" font-family="sans-serif" font-weight="bold" font-size="12">Onda Filtrada</text>
    <text x="630" y="125" fill="#3498db" font-family="sans-serif" font-weight="bold" font-size="12" opacity="0.8">Ruído (Tick)</text>
  </g>
  <text x="350" y="290" fill="#fff" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">Isolamento Harmônico com Algoritmo DSP (Paparazi.v4)</text>
</svg>
